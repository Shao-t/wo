<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣航空路線地圖</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="airline-data.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f5f5f7;
      overflow: hidden;
    }
    #app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    #map { position: absolute; inset: 0; z-index: 1; }

    .leaflet-tile { filter: saturate(0.45) brightness(1.06); }
    .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }
    .leaflet-tooltip {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: #555 !important;
      font-family: -apple-system, sans-serif !important;
      font-size: 10px !important;
      font-weight: 500 !important;
      padding: 0 !important;
      white-space: nowrap !important;
    }
    .route-popup .leaflet-popup-content-wrapper {
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 0.5px solid rgba(0,0,0,0.08);
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.16);
    }
    .route-popup .leaflet-popup-content {
      margin: 14px 16px;
      color: #1d1d1f;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }
    .route-popup .leaflet-popup-tip {
      background: rgba(255,255,255,0.94);
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }
    .route-popup-shell { min-width: 170px; max-width: 240px; }
    .route-popup-header {
      display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px;
    }
    .route-popup-iata { font-size: 24px; font-weight: 600; letter-spacing: 0.04em; }
    .route-popup-city { font-size: 13px; color: #86868b; }
    .route-popup-rows { display: flex; flex-direction: column; gap: 7px; }
    .route-popup-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .route-popup-key { font-size: 11px; color: #86868b; flex-shrink: 0; }
    .route-popup-val { font-size: 11px; font-weight: 500; color: #1d1d1f; text-align: right; line-height: 1.3; }
    @media (pointer: coarse) {
      #info-card {
        left: 12px;
        right: 12px;
        bottom: 14px;
        width: auto;
        max-width: none;
      }
      /* 手機 header：改為兩行垂直堆疊 */
      #header {
        height: auto;
        min-height: unset;
        padding: 8px 10px 6px;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        justify-content: flex-start;
      }
      #header-left {
        width: 100%;
        gap: 0;
      }
      /* tabs 撐滿整行，每個 tab 均分 */
      #airline-tabs {
        width: 100%;
        display: flex;
        gap: 2px;
        padding: 3px;
      }
      .tab-btn {
        flex: 1;
        justify-content: center;
        padding: 5px 4px;
        gap: 4px;
        min-width: 0;
      }
      .tab-label {
        font-size: 10px;
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      /* stats 獨佔第二行，靠左排列 */
      #stats {
        width: 100%;
        justify-content: flex-start;
        gap: 10px;
        padding: 0 2px;
      }
      .stat-item { align-items: flex-start; }
      .stat-value { font-size: 13px; }
      .stat-sub { font-size: 9px; }
      #stat-name {
        font-size: 13px !important;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 180px;
      }
      /* search 跟著 header 高度下移 */
      #search-wrap { top: 110px; width: calc(100vw - 24px); max-width: 360px; }
      .leaflet-tooltip { font-size: 11px !important; }
    }

    /* Header */
    #header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      min-height: 68px; display: flex; align-items: center; justify-content: space-between;
      padding: 10px 24px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
    }
    #header-left { display: flex; flex-direction: row; align-items: center; gap: 10px; flex-wrap: wrap; }
    #page-links {
      display: flex; gap: 6px; flex-wrap: wrap;
      background: rgba(0,0,0,0.04);
      padding: 4px; border-radius: 12px;
      width: fit-content;
    }
    .page-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 9px; text-decoration: none;
      color: #1d1d1f; font-size: 11px; font-weight: 600;
      letter-spacing: 0.04em; user-select: none;
      background: transparent; transition: background 0.15s, transform 0.15s;
    }
    .page-link:hover { background: rgba(255,255,255,0.8); transform: translateY(-1px); }
    .page-link.active { background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
    .page-link .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    #airline-tabs {
      display: flex; gap: 2px;
      background: rgba(0,0,0,0.06);
      border-radius: 10px; padding: 3px;
    }
    .tab-btn {
      padding: 5px 16px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s; user-select: none;
    }
    .tab-dot { width: 7px; height: 7px; border-radius: 50%; transition: background 0.2s; }
    .tab-label { font-size: 12px; letter-spacing: 0.06em; transition: all 0.2s; }

    #stats { display: flex; align-items: center; gap: 20px; }
    .stat-item { display: flex; flex-direction: column; align-items: flex-end; }
    .stat-value { font-size: 16px; font-weight: 500; line-height: 1; }
    .stat-sub { font-size: 10px; color: #86868b; margin-top: 1px; }
    .stat-divider { width: 0.5px; height: 24px; background: rgba(0,0,0,0.12); }

    /* Search */
    #search-wrap {
      position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
      z-index: 20; width: 280px;
    }
    #search-inner { position: relative; }
    #search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      pointer-events: none;
    }
    #search-input {
      width: 100%; height: 36px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 10px; padding: 0 14px 0 36px;
      font-family: inherit; font-size: 13px; color: #1d1d1f; outline: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: border-color 0.2s;
    }
    #search-results {
      display: none;
      margin-top: 6px; background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(0,0,0,0.12); border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12); overflow: hidden;
    }
    .result-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 14px;
      cursor: pointer; transition: background 0.1s;
    }
    .result-iata { font-size: 12px; font-weight: 600; min-width: 32px; }
    .result-city { font-size: 13px; color: #1d1d1f; }
    .result-meta { margin-left: auto; font-size: 11px; color: #86868b; }

    /* Info Card */
    #info-card {
      position: absolute; bottom: 32px; left: 24px; z-index: 20;
      width: 220px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 16px; padding: 15px 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      opacity: 0;
      transform: translateY(6px) scale(0.98);
      transition: opacity 0.18s, transform 0.18s;
      pointer-events: none;
    }
    #card-iata { font-size: 24px; font-weight: 600; color: #1d1d1f; letter-spacing: 0.04em; }
    #card-city { font-size: 13px; color: #86868b; }
    #card-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 11px; }
    #card-rows { display: flex; flex-direction: column; gap: 7px; }
    .card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-key { font-size: 11px; color: #86868b; flex-shrink: 0; }
    .card-val { font-size: 11px; font-weight: 500; color: #1d1d1f; text-align: right; line-height: 1.3; }

    /* Zoom */
    #zoom-ctrl {
      position: absolute; bottom: 32px; right: 24px; z-index: 20;
      display: flex; flex-direction: column;
      border-radius: 10px; overflow: hidden;
      border: 0.5px solid rgba(0,0,0,0.12);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: bottom 0.3s;
    }
    .zoom-btn {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px; color: #1d1d1f;
      user-select: none; transition: background 0.15s; line-height: 1;
    }
    .zoom-btn:hover { background: rgba(0,0,0,0.05); }
    .zoom-btn.zoom-out { border-top: 0.5px solid rgba(0,0,0,0.1); }
    #source-note {
      position: absolute; right: 24px; bottom: 16px; z-index: 20;
      font-size: 9px; line-height: 1.35; color: rgba(29,29,31,0.68);
      text-align: right; pointer-events: none; user-select: none;
      text-shadow: 0 1px 2px rgba(255,255,255,0.55);
    }
  </style>
</head>
<body>
<div id="app">
  <div id="map"></div>

  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <div id="airline-tabs">
        <div class="tab-btn" id="tab-JX" onclick="switchAirline('JX')">
          <div class="tab-dot" id="dot-JX"></div>
          <span class="tab-label" id="label-JX" data-short="STARLUX">STARLUX</span>
        </div>
        <div class="tab-btn" id="tab-BR" onclick="switchAirline('BR')">
          <div class="tab-dot" id="dot-BR"></div>
          <span class="tab-label" id="label-BR" data-short="EVA AIR">EVA AIR</span>
        </div>
        <div class="tab-btn" id="tab-CI" onclick="switchAirline('CI')">
          <div class="tab-dot" id="dot-CI"></div>
          <span class="tab-label" id="label-CI" data-short="CHINA AIR">CHINA AIR</span>
        </div>
        <div class="tab-btn" id="tab-MU" onclick="switchAirline('MU')">
          <div class="tab-dot" id="dot-MU"></div>
          <span class="tab-label" id="label-MU" data-short="CHINA EAST">CHINA EAST</span>
        </div>
      </div>
    </div>
    <div id="stats">
      <div class="stat-item">
        <span class="stat-value" id="stat-dest" style="color:#9c6c4c">35</span>
        <span class="stat-sub">目的地</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="stat-name" style="color:#1d1d1f; font-size:16px">星宇航空</span>
      </div>
    </div>
  </div>

  <!-- Search -->
  <div id="search-wrap">
    <div id="search-inner">
      <svg id="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="5.5" cy="5.5" r="4" stroke="#86868b" stroke-width="1.3"/>
        <path d="M9 9L12.5 12.5" stroke="#86868b" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <input id="search-input" type="text" placeholder="搜尋城市或 IATA 代碼" oninput="onSearch(this.value)" />
    </div>
    <div id="search-results"></div>
  </div>

  <!-- Info Card -->
  <div id="info-card">
    <div id="card-header">
      <span id="card-iata"></span>
      <span id="card-city"></span>
    </div>
    <div id="card-rows"></div>
  </div>

  <!-- Zoom -->
  <div id="zoom-ctrl">
    <div class="zoom-btn" onclick="map.zoomIn()">+</div>
    <div class="zoom-btn zoom-out" onclick="map.zoomOut()">−</div>
  </div>
  <div id="source-note">
    <div>參考文獻來自維基百科</div>
    <div>Reference sources from Wikipedia</div>
  </div>
</div>

<script>
// ── UTILS ─────────────────────────────────────────────────────────────────────
function haversine(a, b) {
  const R = 6371, r = Math.PI / 180;
  const dLat = (b[0]-a[0])*r, dLon = (b[1]-a[1])*r;
  const h = Math.sin(dLat/2)**2 + Math.cos(a[0]*r)*Math.cos(b[0]*r)*Math.sin(dLon/2)**2;
  return Math.round(2*R*Math.asin(Math.sqrt(h)));
}
const LEFT_SIDE_AIRPORTS = new Set(["MAD", "LHR"]);

function bezierArc(s, e, preferLeftSide = false) {
  let eLng = e[1];
  if (!preferLeftSide && s[1] > 0 && e[1] < 0) eLng = e[1] + 360;
  const mLat = (s[0]+e[0])/2 + 6, mLng = (s[1]+eLng)/2;
  const pts = [];
  for (let t = 0; t <= 1; t += 0.02)
    pts.push([(1-t)**2*s[0]+2*(1-t)*t*mLat+t**2*e[0], (1-t)**2*s[1]+2*(1-t)*t*mLng+t**2*eLng]);
  return pts;
}
function fmtCoord(c) {
  return `${Math.abs(c[0]).toFixed(2)}°${c[0]>=0?"N":"S"} ${Math.abs(c[1]).toFixed(2)}°${c[1]>=0?"E":"W"}`;
}
function mapCoord(c, iata) {
  // 預設把西半球往右側平移，讓跨圖路線保持一致；少數例外維持左側顯示。
  if (c[1] < 0 && !LEFT_SIDE_AIRPORTS.has(iata)) return [c[0], c[1] + 360];
  return c;
}
const isTouchDevice = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
const markerRadius = isTouchDevice ? 7 : 4;
const hitRadius = isTouchDevice ? 20 : 10;
// 手機端使用短標籤避免擁擠
if (isTouchDevice) {
  document.querySelectorAll(".tab-label[data-short]").forEach(el => {
    el.textContent = el.dataset.short;
  });
}
let activeRoutePopup = null;
function estimateFlightTime(distanceKm) {
  // Very rough block-time estimate: cruise + taxi/takeoff/landing overhead.
  let cruiseSpeed = 820;
  let overheadMinutes = 30;
  if (distanceKm < 1000) {
    cruiseSpeed = 720;
    overheadMinutes = 25;
  } else if (distanceKm < 3000) {
    cruiseSpeed = 790;
    overheadMinutes = 30;
  } else if (distanceKm < 6000) {
    cruiseSpeed = 830;
    overheadMinutes = 35;
  }
  const totalMinutes = Math.round(distanceKm / cruiseSpeed * 60 + overheadMinutes);
  const hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  return `${hours} 小時 ${String(minutes).padStart(2, "0")} 分`;
}
function routeRows(d, id) {
  const al = AIRLINES[id];
  const distanceKm = haversine(al.hub, d[2]);
  const hubLabel = al.hubLabel || "TPE";
  const rows = [
    ["地區",   (al.rgn)[d[3]] || d[3]],
    [`距 ${hubLabel}`, distanceKm.toLocaleString() + " km"],
    ["預估飛行時間", estimateFlightTime(distanceKm)],
    ["座標",   fmtCoord(d[2])],
  ];
  if (d[4]) rows.push(["每週班次", `${d[4]} 班`]);
  if (d[6] && d[6] !== "TPE") rows.push(["出發樞紐", d[6] === "TSA" ? "TSA 松山" : d[6] === "BOTH" ? "TPE+TSA 雙樞紐" : d[6]]);
  return rows;
}
function routePopupHtml(d, id) {
  return `
    <div class="route-popup-shell">
      <div class="route-popup-header">
        <span class="route-popup-iata">${d[0]}</span>
        <span class="route-popup-city">${d[1]}</span>
      </div>
      <div class="route-popup-rows">
        ${routeRows(d, id).map(([k, v]) =>
          `<div class="route-popup-row"><span class="route-popup-key">${k}</span><span class="route-popup-val">${v}</span></div>`
        ).join("")}
      </div>
    </div>
  `;
}
function renderInfoCard(d, id) {
  const al = AIRLINES[id];
  const card = document.getElementById("info-card");
  card.style.borderColor = al.color + "44";
  document.getElementById("card-iata").textContent = d[0];
  document.getElementById("card-city").textContent = d[1];

  const rows = routeRows(d, id);
  const rowsEl = document.getElementById("card-rows");
  rowsEl.innerHTML = rows.map(([k, v]) =>
    `<div class="card-row"><span class="card-key">${k}</span><span class="card-val">${v}</span></div>`
  ).join("");

  card.style.opacity = "1";
  card.style.transform = "translateY(0) scale(1)";
}
function hideInfoCard() {
  const card = document.getElementById("info-card");
  card.style.opacity = "0";
  card.style.transform = "translateY(6px) scale(0.98)";
}
function closeRoutePopup() {
  if (activeRoutePopup) {
    map.closePopup(activeRoutePopup);
    activeRoutePopup = null;
  }
  if (activeLine) {
    map.removeLayer(activeLine);
    activeLine = null;
  }
}
function openRoutePopup(d, id, pinned = false) {
  closeRoutePopup();
  const al = AIRLINES[id];
  const rawHub = (id === "BR" && d[6] === "TSA") ? EVA_HUB2
               : (id === "BR" && d[6] === "BOTH") ? EVA_HUB2
               : al.hub;
  const hubCoord = mapCoord(rawHub, "");
  const viewCoord = mapCoord(d[2], d[0]);
  activeLine = L.polyline(
    bezierArc(hubCoord, viewCoord, LEFT_SIDE_AIRPORTS.has(d[0])),
    { color:al.color, weight:1.5, opacity:0.5 }
  ).addTo(map);
  activeRoutePopup = L.popup({
    className: "route-popup",
    closeButton: false,
    autoClose: false,
    closeOnClick: false,
    autoPan: true,
    keepInView: true,
    offset: isTouchDevice ? [18, 0] : [14, 0]
  }).setLatLng(viewCoord).setContent(routePopupHtml(d, id)).openOn(map);
}
function freqLabel(freq) {
  if (!freq) return null;
  if (freq === 7) return "每日";
  return `每週 ${freq} 班`;
}

// ── DATA ──────────────────────────────────────────────────────────────────────
const initialAirline = (() => {
  const value = new URLSearchParams(location.search).get("airline");
  return value ? value.toUpperCase() : "JX";
})();

const STARLUX_HUB = AIRLINE_DATA.JX.hub;
const EVA_HUB     = AIRLINE_DATA.BR.hub;
const CI_HUB      = AIRLINE_DATA.CI.hub;

const AIRLINES = {
  JX: AIRLINE_DATA.JX,
  BR: AIRLINE_DATA.BR,
  CI: AIRLINE_DATA.CI,
  MU: AIRLINE_DATA.MU,
};

// ── MAP INIT ──────────────────────────────────────────────────────────────────
let map, activeAirline = initialAirline, activeLine = null;
let mapWasDragged = false;
const layers = { JX: {}, BR: {}, CI: {}, MU: {} };
const hubMarkers = {};

window.addEventListener("DOMContentLoaded", () => {
  map = L.map("map", { worldCopyJump: false, minZoom: 2, zoomControl: false }).setView([25, 115], 3);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { opacity: 0.9 }).addTo(map);
  map.on("click", () => {
    hideInfoCard();
    closeRoutePopup();
  });
  map.on("dragstart", () => { mapWasDragged = true; });
  map.on("click",     () => { mapWasDragged = false; });

  // Build markers for all airlines
  ["JX","BR","CI","MU"].forEach(id => {
    const al = AIRLINES[id];
    al.dest.forEach(d => {
      const viewCoord = mapCoord(d[2], d[0]);
      const visibleMarker = L.circleMarker(viewCoord, {
        radius: markerRadius, color: al.color, fillColor: al.color, fillOpacity: 0.4, weight: 1.5
      });
      visibleMarker.bindTooltip(d[0], { permanent: true, direction: "right", offset: [5, 0] });
      const hitMarker = L.circleMarker(viewCoord, {
        radius: hitRadius, color: al.color, fillColor: al.color, fillOpacity: 0.001, opacity: 0, weight: 0,
        interactive: true, bubblingMouseEvents: false
      });
      layers[id][d[0]] = { marker: visibleMarker, hit: hitMarker };
    });
  });

  // Hub markers
  hubMarkers["JX_TPE"] = L.circleMarker(STARLUX_HUB, { radius:8, color:"#9c6c4c", fillColor:"#9c6c4c", fillOpacity:1, weight:2 })
    .bindTooltip("TPE 桃園", { permanent:true, direction:"right", offset:[9,0] });
  hubMarkers["BR_TPE"] = L.circleMarker(EVA_HUB, { radius:8, color:"#00a86b", fillColor:"#00a86b", fillOpacity:1, weight:2 })
    .bindTooltip("TPE 桃園", { permanent:true, direction:"right", offset:[9,0] });
  hubMarkers["BR_TSA"] = L.circleMarker(AIRLINE_DATA.BR.hub2, { radius:6, color:"#00a86b", fillColor:"#fff", fillOpacity:1, weight:2 })
    .bindTooltip("TSA 松山", { permanent:true, direction:"right", offset:[7,0] });
  hubMarkers["CI_TPE"] = L.circleMarker(CI_HUB, { radius:8, color:"#003087", fillColor:"#003087", fillOpacity:1, weight:2 })
    .bindTooltip("TPE 桃園", { permanent:true, direction:"right", offset:[9,0] });
  hubMarkers["MU_PVG"] = L.circleMarker(AIRLINE_DATA.MU.hub, { radius:8, color:"#d10000", fillColor:"#d10000", fillOpacity:1, weight:2 })
    .bindTooltip("PVG 浦東", { permanent:true, direction:"right", offset:[9,0] });

  if (!AIRLINES[activeAirline]) activeAirline = "JX";
  showAirline(activeAirline);
  updateUI();
});

function showAirline(id) {
  const al = AIRLINES[id];
  const otherIDs = ["JX","BR","CI","MU"].filter(x => x !== id);

  // Hide others
  otherIDs.forEach(otherID => {
    Object.values(layers[otherID]).forEach(route => {
      if (map.hasLayer(route.hit)) map.removeLayer(route.hit);
      if (map.hasLayer(route.marker)) map.removeLayer(route.marker);
    });
    Object.keys(hubMarkers).forEach(k => {
      if (k.startsWith(otherID)) { const m = hubMarkers[k]; if (map.hasLayer(m)) map.removeLayer(m); }
    });
  });

  // Show this
  al.dest.forEach(d => {
    const route = layers[id][d[0]];
    if (!map.hasLayer(route.marker)) route.marker.addTo(map);
    if (!map.hasLayer(route.hit)) route.hit.addTo(map);

    route.hit.off("mouseover").off("mouseout").off("click").off("touchstart").off("touchend");
    route.hit.on("click", (e) => {
      if (mapWasDragged) { mapWasDragged = false; return; }
      if (e.originalEvent) L.DomEvent.stop(e.originalEvent);
      showCard(d, id);
    });
  });

  const tpeHub = hubMarkers[`${id}_TPE`];
  if (tpeHub && !map.hasLayer(tpeHub)) tpeHub.addTo(map);
  const pvgHub = hubMarkers[`${id}_PVG`];
  if (pvgHub && !map.hasLayer(pvgHub)) pvgHub.addTo(map);
  if (id === "BR" && hubMarkers["BR_TSA"] && !map.hasLayer(hubMarkers["BR_TSA"])) hubMarkers["BR_TSA"].addTo(map);
  if (!isTouchDevice) closeRoutePopup();
}

function switchAirline(id) {
  if (id === activeAirline) return;
  activeAirline = id;
  document.getElementById("search-input").value = "";
  document.getElementById("search-results").style.display = "none";
  showAirline(id);
  updateUI();
}

function updateUI() {
  const al = AIRLINES[activeAirline];

  // Tabs
  ["JX","BR","CI","MU"].forEach(id => {
    const a = AIRLINES[id];
    const active = activeAirline === id;
    document.getElementById(`tab-${id}`).style.background = active ? "#fff" : "transparent";
    document.getElementById(`tab-${id}`).style.boxShadow = active ? "0 1px 4px rgba(0,0,0,0.12)" : "none";
    document.getElementById(`dot-${id}`).style.background = active ? a.color : "#bbb";
    document.getElementById(`label-${id}`).style.color = active ? "#1d1d1f" : "#86868b";
    document.getElementById(`label-${id}`).style.fontWeight = active ? "600" : "400";
  });

  // Stats
  document.getElementById("stat-dest").textContent = al.dest.length;
  document.getElementById("stat-dest").style.color = al.color;
  document.getElementById("stat-name").textContent = al.fullName;

  // Search border color
  document.getElementById("search-input").style.borderColor = "rgba(0,0,0,0.15)";

}

function showCard(d, id) {
  openRoutePopup(d, id, false);
}

function hideCard() {
  if (isTouchDevice) {
    hideInfoCard();
    return;
  }
  closeRoutePopup();
}

function onSearch(val) {
  const input = document.getElementById("search-input");
  const resultsEl = document.getElementById("search-results");
  const al = AIRLINES[activeAirline];

  if (!val.trim()) {
    resultsEl.style.display = "none";
    input.style.borderColor = "rgba(0,0,0,0.15)";
    return;
  }

  input.style.borderColor = al.color + "66";
  const q = val.toLowerCase();
  const hits = al.dest.filter(d => d[0].toLowerCase().includes(q) || d[1].includes(val)).slice(0, 6);

  if (hits.length === 0) {
    resultsEl.style.display = "none";
    return;
  }

  resultsEl.innerHTML = hits.map((d, i) => {
    const border = i < hits.length-1 ? "border-bottom:0.5px solid rgba(0,0,0,0.06)" : "";
    const meta = d[4] ? freqLabel(d[4]) : (al.rgn)[d[3]];
    return `<div class="result-item" style="${border}" onclick="flyTo('${d[0]}')"
      onmouseenter="this.style.background='${al.color}0f'"
      onmouseleave="this.style.background='transparent'">
      <span class="result-iata" style="color:${al.color}">${d[0]}</span>
      <span class="result-city">${d[1]}</span>
      <span class="result-meta">${meta || ""}</span>
    </div>`;
  }).join("");
  resultsEl.style.display = "block";
}

function flyTo(iata) {
  const al = AIRLINES[activeAirline];
  const d = al.dest.find(x => x[0] === iata);
  if (!d) return;
  map.flyTo(mapCoord(d[2], d[0]), 6, { duration: 1.2 });
  document.getElementById("search-input").value = "";
  document.getElementById("search-results").style.display = "none";
  map.once("moveend", () => showCard(d, activeAirline));
}
</script>
</body>
</html>
