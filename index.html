  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f5f5f7;
      overflow: hidden;
    }
    #app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    #map { position: absolute; inset: 0; z-index: 1; }

    .leaflet-tile { filter: saturate(0.45) brightness(1.06); }
    .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }
    .leaflet-tooltip {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: #555 !important;
      font-family: -apple-system, sans-serif !important;
      font-size: 10px !important;
      font-weight: 500 !important;
      padding: 0 !important;
      white-space: nowrap !important;
    }
    .route-popup .leaflet-popup-content-wrapper {
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 0.5px solid rgba(0,0,0,0.08);
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.16);
    }
    .route-popup .leaflet-popup-content {
      margin: 14px 16px;
      color: #1d1d1f;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }
    .route-popup .leaflet-popup-tip {
      background: rgba(255,255,255,0.94);
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }
    .route-popup-shell { min-width: 170px; max-width: 240px; }
    .route-popup-header {
      display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px;
    }
    .route-popup-iata { font-size: 24px; font-weight: 600; letter-spacing: 0.04em; }
    .route-popup-city { font-size: 13px; color: #86868b; }
    .route-popup-rows { display: flex; flex-direction: column; gap: 7px; }
    .route-popup-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .route-popup-key { font-size: 11px; color: #86868b; flex-shrink: 0; }
    .route-popup-val { font-size: 11px; font-weight: 500; color: #1d1d1f; text-align: right; line-height: 1.3; }

    /* Info card */
    #info-card {
      position: absolute; left: 24px; bottom: 24px; z-index: 20;
      width: 240px; max-width: 280px;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 0.5px solid rgba(0,0,0,0.08);
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.16);
      padding: 14px 16px;
      opacity: 0;
      transform: translateY(6px) scale(0.98);
      transition: opacity 0.18s, transform 0.18s;
    }
    .card-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
    .card-iata { font-size: 24px; font-weight: 600; letter-spacing: 0.04em; }
    .card-city { font-size: 13px; color: #86868b; }
    .card-rows { display: flex; flex-direction: column; gap: 7px; }
    .card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-key { font-size: 11px; color: #86868b; flex-shrink: 0; }
    .card-val { font-size: 11px; font-weight: 500; color: #1d1d1f; text-align: right; line-height: 1.3; }

    @media (pointer: coarse) {
      #info-card {
        left: 12px;
        right: 12px;
        bottom: 14px;
        width: auto;
        max-width: none;
      }
      /* 手機 header：改為兩行垂直堆疊 */
      #header {
        height: auto;
        min-height: unset;
        padding: 8px 10px 6px;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        justify-content: flex-start;

      #header-left {
        width: 100%;
        gap: 0;
      }
      /* tabs 撐滿整行，每個 tab 均分 */
      #airline-tabs {

        display: flex;
        gap: 2px;
        padding: 3px;
      }
      .tab-btn {
        flex: 1;

        padding: 5px 4px;
        gap: 4px;
        min-width: 0;

        -webkit-appearance: none; appearance: none;

      .tab-label {

        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;

      padding: 4px; border-radius: 12px;

<body>

<script>
// ── UTILS ─────────────────────────────────────────────────────────────────────
function haversine(a, b) {
  const R = 6371, r = Math.PI / 180;
  const dLat = (b[0]-a[0])*r, dLon = (b[1]-a[1])*r;
  const h = Math.sin(dLat/2)**2 + Math.cos(a[0]*r)*Math.cos(b[0]*r)*Math.sin(dLon/2)**2;
  return Math.round(2*R*Math.asin(Math.sqrt(h)));
}
const LEFT_SIDE_AIRPORTS = new Set(["MAD", "LHR"]);

function bezierArc(s, e, preferLeftSide = false) {
  let eLng = e[1];
  if (!preferLeftSide && s[1] > 0 && e[1] < 0) eLng = e[1] + 360;
  const mLat = (s[0]+e[0])/2 + 6, mLng = (s[1]+eLng)/2;
  const pts = [];
  for (let t = 0; t <= 1; t += 0.02)
    pts.push([(1-t)**2*s[0]+2*(1-t)*t*mLat+t**2*e[0], (1-t)**2*s[1]+2*(1-t)*t*mLng+t**2*eLng]);
  return pts;
}
function fmtCoord(c) {
  return `${Math.abs(c[0]).toFixed(2)}°${c[0]>=0?"N":"S"} ${Math.abs(c[1]).toFixed(2)}°${c[1]>=0?"E":"W"}`;
}
function mapCoord(c, iata) {
  // 預設把西半球往右側平移，讓跨圖路線保持一致；少數例外維持左側顯示。
  if (c[1] < 0 && !LEFT_SIDE_AIRPORTS.has(iata)) return [c[0], c[1] + 360];
  return c;
}
const isTouchDevice = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
const markerRadius = isTouchDevice ? 7 : 4;
const hitRadius = isTouchDevice ? 20 : 10;
// 手機端使用短標籤避免擁擠
if (isTouchDevice) {
  document.querySelectorAll(".tab-label[data-short]").forEach(el => {
    el.textContent = el.dataset.short;
  });
}
let activeRoutePopup = null;
function estimateFlightTime(distanceKm) {
  // Very rough block-time estimate: cruise + taxi/takeoff/landing overhead.
  let cruiseSpeed = 820;
  let overheadMinutes = 30;
  if (distanceKm < 1000) {
    cruiseSpeed = 720;
    overheadMinutes = 25;
  } else if (distanceKm < 3000) {
    cruiseSpeed = 790;
    overheadMinutes = 30;
  } else if (distanceKm < 6000) {
    cruiseSpeed = 830;
    overheadMinutes = 35;
  }
  const totalMinutes = Math.round(distanceKm / cruiseSpeed * 60 + overheadMinutes);
  const hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  return `${hours} 小時 ${String(minutes).padStart(2, "0")} 分`;
}
function routeRows(d, id) {
  const meta = AIRLINE_META_INFO[id] || {};
  const hubCoord = HUB_COORDS[d.origin] || meta.hubCoords || HUB_COORDS.TPE;
  const distanceKm = haversine(hubCoord, d.coords);
  const hubLabel = HUB_LABELS[d.origin] || meta.hub || d.origin || "TPE";
  const rows = [
    ["地區",   REGION_LABELS[d.region] || d.region],
    [`距 ${hubLabel}`, distanceKm.toLocaleString() + " km"],
    ["預估飛行時間", estimateFlightTime(distanceKm)],
    ["座標",   fmtCoord(d.coords)],
  ];

  if (d.origin && d.origin !== (meta.hub || "TPE")) rows.push(["出發樞紐", HUB_LABELS[d.origin] || d.origin]);
  return rows;
}
function routePopupHtml(d, id) {
  return `
    <div class="route-popup-shell">
      <div class="route-popup-header">
        <span class="route-popup-iata">${d.iata}</span>
        <span class="route-popup-city">${d.city}</span>
      </div>
      <div class="route-popup-rows">
        ${routeRows(d, id).map(([k, v]) =>
          `<div class="route-popup-row"><span class="route-popup-key">${k}</span><span class="route-popup-val">${v}</span></div>`
        ).join("")}
      </div>
    </div>
  `;
}
function renderInfoCard(d, id) {
  const meta = AIRLINE_META_INFO[id] || {};
  const card = document.getElementById("info-card");
  card.style.borderColor = (meta.color || "#000") + "44";
  document.getElementById("card-iata").textContent = d.iata;
  document.getElementById("card-city").textContent = d.city;

  const rows = routeRows(d, id);
  const rowsEl = document.getElementById("card-rows");
  rowsEl.innerHTML = rows.map(([k, v]) =>
    `<div class="card-row"><span class="card-key">${k}</span><span class="card-val">${v}</span></div>`
  ).join("");

  card.style.opacity = "1";
  card.style.transform = "translateY(0) scale(1)";
}
function hideInfoCard() {
  const card = document.getElementById("info-card");
  card.style.opacity = "0";
  card.style.transform = "translateY(6px) scale(0.98)";
}
function closeRoutePopup() {
  if (activeRoutePopup) {
    map.closePopup(activeRoutePopup);
    activeRoutePopup = null;
  }
  if (activeLine) {
    map.removeLayer(activeLine);
    activeLine = null;
  }
}
function openRoutePopup(d, id, pinned = false) {
  closeRoutePopup();
  const meta = AIRLINE_META_INFO[id] || {};
  const rawHub = HUB_COORDS[d.origin] || meta.hubCoords || HUB_COORDS.TPE;
  const hubCoord = mapCoord(rawHub, "");
  const viewCoord = mapCoord(d.coords, d.iata);
  activeLine = L.polyline(
    bezierArc(hubCoord, viewCoord, LEFT_SIDE_AIRPORTS.has(d.iata)),
    { color:meta.color || "#000", weight:1.5, opacity:0.5 }
  ).addTo(map);
  activeRoutePopup = L.popup({
    className: "route-popup",
    closeButton: false,
    autoClose: false,
    closeOnClick: false,
    autoPan: true,
    keepInView: true,
    offset: isTouchDevice ? [18, 0] : [14, 0]
  }).setLatLng(viewCoord).setContent(routePopupHtml(d, id)).openOn(map);
}
function freqLabel(freq) {
  if (!freq) return null;
  if (freq === 7) return "每日";
  return `每週 ${freq} 班`;
}

// ── DATA ──────────────────────────────────────────────────────────────────────
const initialAirline = (() => {
  const value = new URLSearchParams(location.search).get("airline");
  return value ? value.toUpperCase() : "JX";
})();

const HUB_COORDS = {
  TPE: [25.0797, 121.2342],
  TSA: [25.0694, 121.5515],
  PVG: [31.1443, 121.8083],
};
const HUB_LABELS = {
  TPE: "TPE 桃園",
  TSA: "TSA 松山",
  PVG: "PVG 浦東",
};
const AIRLINE_META_INFO = window.AIRLINE_META || {};
const AIRLINES = {
  JX: AIRLINE_DATA.JX || [],
  BR: AIRLINE_DATA.BR || [],
  CI: AIRLINE_DATA.CI || [],
  MU: AIRLINE_DATA.MU || [],
};

// ── MAP INIT ──────────────────────────────────────────────────────────────────
let map, activeAirline = initialAirline, activeLine = null;
let mapWasDragged = false;
const layers = { JX: {}, BR: {}, CI: {}, MU: {} };
const hubMarkers = {};

window.addEventListener("DOMContentLoaded", () => {
  // Star rating listeners (moved here to guarantee DOM is ready and isolate from map init)
  document.querySelectorAll('.fb-star').forEach(s => {
    s.addEventListener('mouseenter', () => { fbHighlight(+s.dataset.val); document.getElementById('fb-star-hint').textContent = FB_STAR_LABELS[+s.dataset.val]; });
    s.addEventListener('mouseleave', () => { fbHighlight(fbRating); document.getElementById('fb-star-hint').textContent = fbRating ? FB_STAR_LABELS[fbRating] : ''; });
    s.addEventListener('click',      () => { fbRating = fbRating === +s.dataset.val ? 0 : +s.dataset.val; fbHighlight(fbRating); document.getElementById('fb-star-hint').textContent = fbRating ? FB_STAR_LABELS[fbRating] : ''; });
  });

  map = L.map("map", { worldCopyJump: false, minZoom: 2, zoomControl: false }).setView([25, 115], 3);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { opacity: 0.9 }).addTo(map);
  map.on("click", () => {
    hideInfoCard();
    closeRoutePopup();
  });
  map.on("dragstart", () => { mapWasDragged = true; });
  map.on("dragend", () => { mapWasDragged = false; });
  map.on("click", () => { mapWasDragged = false; });

  // Build markers for all airlines
  ["JX","BR","CI","MU"].forEach(id => {
    const al = AIRLINES[id];
    const meta = AIRLINE_META_INFO[id] || {};
    al.forEach(d => {
      const viewCoord = mapCoord(d.coords, d.iata);
      const visibleMarker = L.circleMarker(viewCoord, {
        radius: markerRadius, color: meta.color, fillColor: meta.color, fillOpacity: 0.4, weight: 1.5
      });
      visibleMarker.bindTooltip(d.iata, { permanent: true, direction: "right", offset: [5, 0] });
      const hitMarker = L.circleMarker(viewCoord, {
        radius: hitRadius,
        stroke: false,
        fill: true,
        fillColor: meta.color,
        fillOpacity: 0.01,
        opacity: 0,
        interactive: true,
        bubblingMouseEvents: false
      });
      layers[id][d.iata] = { marker: visibleMarker, hit: hitMarker };
    });
  });

  // Hub markers
  hubMarkers["JX_TPE"] = L.circleMarker(HUB_COORDS.TPE, { radius:8, color:"#9c6c4c", fillColor:"#9c6c4c", fillOpacity:1, weight:2 })
    .bindTooltip("TPE 桃園", { permanent:true, direction:"right", offset:[9,0] });
  hubMarkers["BR_TPE"] = L.circleMarker(HUB_COORDS.TPE, { radius:8, color:"#00a86b", fillColor:"#00a86b", fillOpacity:1, weight:2 })
    .bindTooltip("TPE 桃園", { permanent:true, direction:"right", offset:[9,0] });
  hubMarkers["BR_TSA"] = L.circleMarker(HUB_COORDS.TSA, { radius:6, color:"#00a86b", fillColor:"#fff", fillOpacity:1, weight:2 })
    .bindTooltip("TSA 松山", { permanent:true, direction:"right", offset:[7,0] });
  hubMarkers["CI_TPE"] = L.circleMarker(HUB_COORDS.TPE, { radius:8, color:"#003087", fillColor:"#003087", fillOpacity:1, weight:2 })
    .bindTooltip("TPE 桃園", { permanent:true, direction:"right", offset:[9,0] });
  hubMarkers["MU_PVG"] = L.circleMarker(HUB_COORDS.PVG, { radius:8, color:"#d10000", fillColor:"#d10000", fillOpacity:1, weight:2 })
    .bindTooltip("PVG 浦東", { permanent:true, direction:"right", offset:[9,0] });

  if (!AIRLINES[activeAirline]) activeAirline = "JX";
  showAirline(activeAirline);
  updateUI();
});

function showAirline(id) {
  const al = AIRLINES[id];
  const otherIDs = ["JX","BR","CI","MU"].filter(x => x !== id);

  // Hide others
  otherIDs.forEach(otherID => {
    Object.values(layers[otherID]).forEach(route => {
      if (map.hasLayer(route.hit)) map.removeLayer(route.hit);
      if (map.hasLayer(route.marker)) map.removeLayer(route.marker);
    });
    Object.keys(hubMarkers).forEach(k => {
      if (k.startsWith(otherID)) { const m = hubMarkers[k]; if (map.hasLayer(m)) map.removeLayer(m); }
    });
  });

  // Show this
  al.forEach(d => {
    const route = layers[id][d.iata];
    if (!map.hasLayer(route.marker)) route.marker.addTo(map);
    if (!map.hasLayer(route.hit)) route.hit.addTo(map);

    route.hit.off("mouseover").off("mouseout").off("click").off("touchstart").off("touchend").off("pointerdown").off("pointerup").off("tap");
    // Desktop: click handler
    route.hit.on("click", (e) => {
      if (mapWasDragged) { mapWasDragged = false; return; }
      L.DomEvent.stopPropagation(e);
      showCard(d, id);
    });
    // iOS/touch: use touchend to avoid preventDefault blocking synthetic click.
    // Only stopPropagation here — never preventDefault on touchstart/touchend,
    // because that kills the browser's synthesised click on iOS Safari.
    let touchMoved = false;
    route.hit.on("touchstart", (e) => {
      touchMoved = false;
      L.DomEvent.stopPropagation(e);
    });
    route.hit.on("touchmove", () => { touchMoved = true; });
    route.hit.on("touchend", (e) => {
      if (touchMoved || mapWasDragged) { mapWasDragged = false; return; }
      L.DomEvent.stopPropagation(e);
      showCard(d, id);
    });
  });

  const tpeHub = hubMarkers[`${id}_TPE`];
  if (tpeHub && !map.hasLayer(tpeHub)) tpeHub.addTo(map);
  const pvgHub = hubMarkers[`${id}_PVG`];
  if (pvgHub && !map.hasLayer(pvgHub)) pvgHub.addTo(map);
  if (id === "BR") {
    const hasTsaRoutes = al.some(d => d.origin === "TSA" || d.origin === "BOTH");
    if (hasTsaRoutes && hubMarkers["BR_TSA"] && !map.hasLayer(hubMarkers["BR_TSA"])) {
      hubMarkers["BR_TSA"].addTo(map);
    }
  }
  if (!isTouchDevice) closeRoutePopup();
}

function switchAirline(id) {
  if (id === activeAirline) return;
  activeAirline = id;
  document.getElementById("search-input").value = "";
  document.getElementById("search-results").style.display = "none";
  showAirline(id);
  updateUI();
}

function updateUI() {
  const al = AIRLINES[activeAirline];
  const meta = AIRLINE_META_INFO[activeAirline] || {};

  // Tabs
  ["JX","BR","CI","MU"].forEach(id => {
    const a = AIRLINE_META_INFO[id] || {};
    const active = activeAirline === id;
    document.getElementById(`tab-${id}`).style.background = active ? "#fff" : "transparent";
    document.getElementById(`tab-${id}`).style.boxShadow = active ? "0 1px 4px rgba(0,0,0,0.12)" : "none";
    document.getElementById(`dot-${id}`).style.background = active ? a.color : "#bbb";
    document.getElementById(`label-${id}`).style.color = active ? "#1d1d1f" : "#86868b";
    document.getElementById(`label-${id}`).style.fontWeight = active ? "600" : "400";
  });

  // Stats
  document.getElementById("stat-dest").textContent = al.length;
  document.getElementById("stat-dest").style.color = meta.color || "#000";

  // Search border color
  document.getElementById("search-input").style.borderColor = "rgba(0,0,0,0.15)";

  // Sync feedback widget color/text with active airline
  const fbFab = document.getElementById('fb-fab');
  const fbSend = document.getElementById('fb-send');
  if (fbFab) {
    fbFab.style.background = meta.color || '#2d6bc4';
    fbFab.title = `回報 · ${meta.fullName || ''}`;
  }
  if (fbSend) {
    fbSend.style.background = meta.color || '#2d6bc4';
    fbSend.style.color = '#fff';
    fbSend.style.borderColor = meta.color || '#2d6bc4';
  }

}

function showCard(d, id) {
  renderInfoCard(d, id);
  openRoutePopup(d, id, false);
}

function hideCard() {
  if (isTouchDevice) {
    hideInfoCard();
    return;
  }
  closeRoutePopup();
}

function onSearch(val) {
  const input = document.getElementById("search-input");
  const resultsEl = document.getElementById("search-results");
  const meta = AIRLINE_META_INFO[activeAirline] || {};
  const al = AIRLINES[activeAirline];

  if (!val.trim()) {
    resultsEl.style.display = "none";
    input.style.borderColor = "rgba(0,0,0,0.15)";
    return;
  }

  input.style.borderColor = (meta.color || "#000") + "66";
  const q = val.toLowerCase();
  const hits = al.filter(d => d.iata.toLowerCase().includes(q) || d.city.includes(val)).slice(0, 6);

  if (hits.length === 0) {
    resultsEl.style.display = "none";
    return;
  }

  resultsEl.innerHTML = hits.map((d, i) => {
    const border = i < hits.length-1 ? "border-bottom:0.5px solid rgba(0,0,0,0.06)" : "";
    const label = REGION_LABELS[d.region];
    return `<div class="result-item" style="${border}" onclick="flyTo('${d.iata}')"
      onmouseenter="this.style.background='${(meta.color||"#000")}0f'"
      onmouseleave="this.style.background='transparent'">
      <span class="result-iata" style="color:${meta.color || "#000"}">${d.iata}</span>
      <span class="result-city">${d.city}</span>
      <span class="result-meta">${label || ""}</span>
    </div>`;
  }).join("");
  resultsEl.style.display = "block";
}

function flyTo(iata) {
  const al = AIRLINES[activeAirline];
  const d = al.find(x => x.iata === iata);
  if (!d) return;
  map.flyTo(mapCoord(d.coords, d.iata), 6, { duration: 1.2 });
  document.getElementById("search-input").value = "";
  document.getElementById("search-results").style.display = "none";
  map.once("moveend", () => showCard(d, activeAirline));
}

// Feedback widget handlers
const FEEDBACK_ENDPOINT = 'https://script.google.com/macros/s/AKfycbyyLemZKexsiJmzsBWDUzTuOXwKUzWZV3FLjozjWh58w47iEqD0T7Cl63pXFn-ipCokFQ/exec';
function fbOpen(){ document.getElementById('fb-overlay').classList.add('show'); document.getElementById('fb-msg').textContent=''; }
function fbClose(){ document.getElementById('fb-overlay').classList.remove('show'); }
const FB_STAR_LABELS = ['','非常差','差','普通','好','非常好'];
let fbRating = 0;
function fbHighlight(val){ document.querySelectorAll('.fb-star').forEach(s => s.classList.toggle('active', +s.dataset.val <= val)); }
// fb-star listeners moved inside DOMContentLoaded (see below) to ensure DOM is ready
// and to prevent any exception here from blocking the map initialisation.
async function fbSubmit(){
  const type=document.getElementById('fb-type').value;
  const desc=document.getElementById('fb-desc').value.trim();
  const contact=document.getElementById('fb-contact').value.trim();
  const msgEl=document.getElementById('fb-msg');
  if(!desc){ msgEl.textContent='請輸入內容'; msgEl.style.color='#ef4444'; return; }
  msgEl.textContent='送出中...'; msgEl.style.color='#8496a9';
  try{
    const res = await fetch(FEEDBACK_ENDPOINT,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({type,description:desc,contact,rating:fbRating||null,page:location.href})});
    if(!res.ok) throw new Error('status '+res.status);
    msgEl.textContent='已送出，謝謝回報！'; msgEl.style.color='#2ca88e';
    document.getElementById('fb-desc').value=''; document.getElementById('fb-contact').value='';
    fbRating=0; fbHighlight(0); document.getElementById('fb-star-hint').textContent='';
    setTimeout(fbClose,1200);
  }catch(err){
    msgEl.textContent='送出失敗，請稍後再試'; msgEl.style.color='#ef4444';
  }
}
</script>
